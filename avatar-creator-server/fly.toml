# Deploy from this directory only: `cd echoAvatar/avatar-creator-server` then `fly deploy`.
# (Do not confuse with `../fly.toml` in echoAvatar root — that is the Colyseus server app.)
#
# fly.toml app configuration file generated for avatar-creator-worker on 2026-02-27T14:56:05+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'avatar-creator-worker'
primary_region = 'syd'

[build]
  dockerfile = 'worker/Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
